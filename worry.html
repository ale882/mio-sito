<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worry Box</title>
    <style>
        body { background: #e0f2f1; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #004d40; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; margin: 0; }
        h2 { margin-top: 32px; }
        textarea { width: 90vw; max-width: 500px; height: 250px; margin-top: 24px; border-radius: 12px; border: 1px solid #80cbc4; padding: 16px; font-size: 1.1rem; }
        .back { margin-top: 24px; background: #00796b; color: #fff; border: none; border-radius: 24px; padding: 12px 32px; font-size: 1rem; cursor: pointer; }
    </style>
</head>
<body>
    <div style="display:flex; flex-direction:column; align-items:center; width:100vw; max-width:100vw;">
        <h2>Worry Box</h2>
        <textarea id="worry-txt" placeholder="Scrivi qui le tue preoccupazioni..."></textarea>
        <button class="back" onclick="window.history.back()">Chiudi</button>
        <script>
            document.querySelector('.back').addEventListener('click', function() {
                localStorage.setItem('skipPopupEmozioni', '1');
            });
        </script>
        <div style="width:100%; max-width:500px; margin-top:24px;">
            <div id="desc-title-worry" style="cursor:pointer; text-decoration:underline; font-weight:bold; color:#00796b;">Perché scrivere le tue preoccupazioni?</div>
            <div id="desc-content-worry" style="max-height:0; overflow:hidden; transition:max-height 0.4s cubic-bezier(0.4,0,0.2,1); background:rgba(187,222,251,0.85); border-radius:18px; color:#004d40; font-size:1.05rem; box-shadow:0 2px 8px rgba(0,0,0,0.04); padding:0 18px;">
                <div style="padding-top:8px;">
                    Scrivere le tue preoccupazioni ti permette di liberare la mente, ridurre l'ansia e vedere i problemi da una nuova prospettiva. Mettere per iscritto ciò che ti preoccupa può aiutarti a gestire meglio le emozioni e a trovare soluzioni più facilmente.
                </div>
            </div>
        </div>
    </div>
    <script>
        const worryTxt = document.getElementById('worry-txt');
        worryTxt.value = localStorage.getItem('worry-box') || '';
        worryTxt.addEventListener('input', () => {
            localStorage.setItem('worry-box', worryTxt.value);
        });

        // Accordion descrizione
        const descTitleWorry = document.getElementById('desc-title-worry');
        const descContentWorry = document.getElementById('desc-content-worry');
        descTitleWorry.addEventListener('click', function() {
            if (descContentWorry.style.maxHeight && descContentWorry.style.maxHeight !== '0px') {
                descContentWorry.style.maxHeight = '0';
            } else {
                descContentWorry.style.maxHeight = descContentWorry.scrollHeight + 'px';
            }
        });
    </script>
</body>
</html>
